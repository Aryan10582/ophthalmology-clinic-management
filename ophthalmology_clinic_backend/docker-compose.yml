services:
  api:
    build: .
    container_name: ophthalmology_clinic_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  db:
    image: postgres:16-alpine
    container_name: ophthalmology_clinic_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic}
      POSTGRES_DB: ${POSTGRES_DB:-ophthalmology_clinic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-clinic} -d $${POSTGRES_DB:-ophthalmology_clinic}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
